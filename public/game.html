<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Tic Tac Toe Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5e6d3;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #d4a762;
            box-shadow: 0 0 20px rgba(212, 167, 98, 0.5);
            width: 400px;
        }
        h1 {
            font-family: 'Pacifico', cursive;
            color: #d4a762;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            margin: 20px auto;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: #fff8f0;
            border: 2px solid #d4a762;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            cursor: pointer;
        }
        .cell:hover {
            background: #ffebcd;
        }
        #status {
            font-size: 1.2em;
            margin: 20px 0;
            color: #5a4a3a;
        }
        .logout-button {
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 10px 20px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍕 Tic Tac Toe 🍔</h1>
        <p id="status">Your turn! Play as X.</p>
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button class="logout-button" id="logout-button">Logout</button>
    </div>
    <script>
        // Basic Tic Tac Toe game logic
        const board = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const status = document.getElementById('status');
        const logoutButton = document.getElementById('logout-button');
        let currentPlayer = 'X';

        // Winning combinations
        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        // Initialize the game board
        function initGame() {
            cells.forEach(cell => {
                cell.textContent = '';
                cell.addEventListener('click', handleCellClick, { once: true });
            });
            status.textContent = `Your turn! Play as ${currentPlayer}.`;
        }

        // Handle cell click
        function handleCellClick(e) {
            const cell = e.target;
            cell.textContent = currentPlayer;
            
            // Check for win
            if (checkWin()) {
                status.textContent = `Player ${currentPlayer} wins!`;
                return;
            }
            
            // Check for draw
            if ([...cells].every(cell => cell.textContent !== '')) {
                status.textContent = 'Game ended in a draw!';
                return;
            }
            
            // Switch player
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            status.textContent = `Next player: ${currentPlayer}`;
        }

        // Check for win
        function checkWin() {
            return winConditions.some(condition => {
                return condition.every(index => {
                    return cells[index].textContent === currentPlayer;
                });
            });
        }

        // Logout function
        logoutButton.addEventListener('click', async () => {
            try {
                const response = await fetch('/api/logout', { method: 'POST' });
                if (response.ok) {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Error logging out:', error);
            }
        });

        // Start the game
        initGame();
    </script>
</body>
</html>

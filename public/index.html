<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Tic Tac Toe Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🍕 Foodie Tic Tac Toe 🍔</h1>
        <form id="login-form">
            <div class="input-group">
                <label for="username">Chef's Name:</label>
                <input type="text" id="username" placeholder="Enter your chef name" required>
            </div>
            <div class="input-group">
                <label for="password">Secret Recipe:</label>
                <input type="password" id="password" placeholder="Enter your secret recipe" required>
            </div>
            <button type="submit" class="food-button">Login & Start Cooking!</button>
            <p id="status-message"></p>
        </form>
        <p>Don't have an account? <a href="/signup.html" class="login-link">Sign up here</a></p>
    </div>
    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Foodie Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5e6d3;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 3px solid #d4a762;
            box-shadow: 0 0 20px rgba(212, 167, 98, 0.5);
            width: 350px;
        }
        h1 {
            font-family: 'Pacifico', cursive;
            color: #d4a762;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #5a4a3a;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #fff8f0;
            border: 2px solid #d4a762;
            border-radius: 8px;
            color: #3a2c1a;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }
        .food-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 8px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        #status-message {
            margin-top: 15px;
            font-size: 0.9em;
            min-height: 20px;
        }
        .login-link {
            margin-top: 15px;
            color: #d4a762;
            text-decoration: none;
        }
        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍕 Sign Up 🍔</h1>
        <form id="signup-form">
            <div class="input-group">
                <label for="username">Chef's Name:</label>
                <input type="text" id="username" placeholder="Enter your chef name" required>
            </div>
            <div class="input-group">
                <label for="password">Secret Recipe:</label>
                <input type="password" id="password" placeholder="Enter your secret recipe" required>
            </div>
            <button type="submit" class="food-button">Sign Up & Start Cooking!</button>
            <p id="status-message"></p>
        </form>
        <p>Already have an account? <a href="/index.html" class="login-link">Login here</a></p>
    </div>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const statusMessage = document.getElementById('status-message');

            statusMessage.style.color = "blue";
            statusMessage.textContent = "Creating your account...";

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    statusMessage.style.color = "green";
                    statusMessage.textContent = `Account created for ${data.user.username}! Redirecting to login...`;
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1500);
                } else {
                    statusMessage.style.color = "red";
                    statusMessage.textContent = data.error || "Signup failed.";
                }
            } catch (error) {
                statusMessage.style.color = "red";
                statusMessage.textContent = "Error connecting to server.";
                console.error(error);
            }
        });
    </script>
</body>
</html>
